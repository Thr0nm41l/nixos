# ===== Background =====
background {
    monitor    =
    path       = screenshot
    blur_passes = 4
    blur_size  = 5
    noise      = 0.01
    brightness = 0.55
    vibrancy   = 0.17
    vibrancy_darkness = 0.0
}

# ===== Time =====
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(cdd6f4ff)
    font_size   = 120
    font_family = JetBrains Mono ExtraBold
    position    = 0, 200
    halign      = center
    valign      = center
}

# ===== Date =====
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color       = rgba(bac2deff)
    font_size   = 18
    font_family = JetBrains Mono
    position    = 0, 100
    halign      = center
    valign      = center
}

# ===== Password input =====
input-field {
    monitor          =
    size             = 300, 50
    outline_thickness = 2
    dots_size        = 0.3
    dots_spacing     = 0.15
    dots_center      = true
    rounding         = 25
    outer_color      = rgba(cba6f7ff)
    inner_color      = rgba(313244ff)
    font_color       = rgba(cdd6f4ff)
    fade_on_empty    = true
    placeholder_text = <i>Password...</i>
    check_color      = rgba(89b4faff)
    fail_color       = rgba(f38ba8ff)
    fail_text        = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color   = rgba(fab387ff)
    position         = 0, -20
    halign           = center
    valign           = center
}

# ===== User label =====
label {
    monitor     =
    text        = thron
    color       = rgba(a6adc8ff)
    font_size   = 14
    font_family = JetBrains Mono
    position    = 0, -80
    halign      = center
    valign      = center
}
