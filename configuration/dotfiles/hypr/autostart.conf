# ===== Wallpaper =====
exec-once = swww-daemon
exec-once = sleep 1 && swww img ~/.config/wallpapers/salty_mountains.png --transition-type fade --transition-duration 1

# ===== Idle management =====
exec-once = hypridle

# ===== Notifications =====
exec-once = swaync

# ===== OSD =====
exec-once = swayosd-server

# ===== Clipboard =====
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ===== Tray =====
exec-once = nm-applet
exec-once = blueman-applet

# ===== Status bar =====
exec-once = waybar

# ===== Polkit =====
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
